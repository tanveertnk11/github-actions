name: "MAtrix test workflow"

on: workflow_dispatch

jobs:
  docker_run:
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        os: ["ubuntu-latest", "ubuntu-20.04", "windows-latest"]
        images: ["hello-world", "alpine"]
        exclude:
          - images: alpine
            os: windows-latest
        include:
          - images: amd64/alpine
            os: ubuntu-20.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Docker info"
        run: docker info
      - name: Docker Run image on ${{matrix.os}}
        run: docker run ${{ matrix.images }}
