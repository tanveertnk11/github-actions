name: "My github action"

on: push

jobs:
  initial_job:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      # - name: "List files"
      #   run: ls
      # - name: "Show readme"
      #   run: cat Readme.md
      - name: Install cowsay
        run: sudo apt-get install cowsay
      - name: "Generate ASCII artwork"
        run: cowsay -f dragon "I am a dragon" > dragon.txt
      - name: "List and read files"
        run: |
          echo "Initial github action"
          ls -ltra
          cat Readme.md
      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragon-text-file
          path: dragon.txt
  list_file_job:
    runs-on: ubuntu-latest
    needs: initial_job
    steps:
      - name: Download the artifact
        uses: actions/download-artifact@v8
        with:
          name: dragon-text-file
      - name: List the files
        run: ls -ltra

  read_file_job:
    runs-on: ubuntu-latest
    needs: list_file_job
    steps:
      - name: Download the artifact
        uses: actions/download-artifact@v8
        with:
          name: dragon-text-file
      - name: read the file
        run: cat dragon.txt
